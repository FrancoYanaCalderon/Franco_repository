{% extends 'base.html' %}
{% block title %}Nuevo Paciente | Clínica{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('pacientes.index') }}" class="btn btn-outline-secondary me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h3 class="fw-bold mb-0">Registrar Paciente</h3>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-body p-4">
        <form action="{{ url_for('pacientes.create') }}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre completo</label>
                <input type="text" class="form-control" name="nombre" placeholder="Ej: María García" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Edad</label>
                <input type="number" class="form-control" name="edad" placeholder="Ej: 35" min="0" max="120" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Dirección</label>
                <input type="text" class="form-control" name="direccion" placeholder="Ej: Calle 5 de Octubre, El Alto" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Teléfono</label>
                <input type="text" class="form-control" name="telefono" placeholder="Ej: 70098765" required>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-semibold">
                <i class="bi bi-check-circle"></i> Registrar Paciente
            </button>
        </form>
    </div>
</div>
{% endblock %}
