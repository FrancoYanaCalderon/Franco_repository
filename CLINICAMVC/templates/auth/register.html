<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro | Clínica Médica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a3c5e 0%, #2e6da4 100%); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .register-card { width: 100%; max-width: 420px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .register-header { background: #1a3c5e; color: white; border-radius: 16px 16px 0 0; padding: 24px; text-align: center; }
    </style>
</head>
<body>
<div class="register-card bg-white">
    <div class="register-header">
        <i class="bi bi-hospital fs-1"></i>
        <h4 class="mt-2 mb-0 fw-bold">ClínicaMVC</h4>
    </div>
    <div class="p-4">
        <h5 class="fw-bold mb-4 text-center">Crear Cuenta</h5>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre completo</label>
                <input type="text" class="form-control" name="nombre" placeholder="Ej: Juan Pérez" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuario</label>
                <input type="text" class="form-control" name="username" placeholder="Nombre de usuario único" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña</label>
                <input type="password" class="form-control" name="password" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Rol</label>
                <select name="rol" class="form-select" required>
                    <option value="enfermero">Enfermero</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-semibold">
                <i class="bi bi-person-plus"></i> Registrarse
            </button>
        </form>
        <hr>
        <p class="text-center text-muted small mb-0">
            ¿Ya tienes cuenta?
            <a href="{{ url_for('auth.login') }}" class="text-primary">Inicia sesión</a>
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
