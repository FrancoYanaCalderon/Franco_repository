<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sesión | Clínica Médica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a3c5e 0%, #2e6da4 100%); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .login-header { background: #1a3c5e; color: white; border-radius: 16px 16px 0 0; padding: 32px; text-align: center; }
        .login-header i { font-size: 3rem; }
    </style>
</head>
<body>
<div class="login-card bg-white">
    <div class="login-header">
        <i class="bi bi-hospital"></i>
        <h4 class="mt-2 mb-0 fw-bold">ClínicaMVC</h4>
        <p class="mb-0 opacity-75 small">Sistema de Gestión Médica</p>
    </div>
    <div class="p-4">
        <h5 class="fw-bold mb-4 text-center">Iniciar Sesión</h5>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="Nombre de usuario" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Contraseña" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">
                <i class="bi bi-box-arrow-in-right"></i> Ingresar
            </button>
        </form>
        <hr>
        <p class="text-center text-muted small mb-0">
            ¿No tienes cuenta?
            <a href="{{ url_for('auth.register') }}" class="text-primary">Regístrate aquí</a>
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
