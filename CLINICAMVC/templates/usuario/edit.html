{% extends 'base.html' %}
{% block title %}Editar Usuario | Panel Admin{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('admin.usuarios') }}" class="btn btn-outline-secondary me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h3 class="fw-bold mb-0">Editar Usuario</h3>
</div>

<div class="card" style="max-width: 500px;">
    <div class="card-body p-4">
        <form action="{{ url_for('admin.edit_usuario', id=usuario.id) }}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre completo</label>
                <input type="text" class="form-control" name="nombre" value="{{ usuario.nombre }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" class="form-control" name="username" value="{{ usuario.username }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Nueva contraseña <span class="text-muted small">(dejar vacío para no cambiar)</span></label>
                <input type="password" class="form-control" name="password" placeholder="Nueva contraseña">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Rol</label>
                <select name="rol" class="form-select" required>
                    <option value="enfermero" {% if usuario.rol == 'enfermero' %}selected{% endif %}>Enfermero</option>
                    <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
                </select>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-semibold">
                <i class="bi bi-check-circle"></i> Actualizar Usuario
            </button>
        </form>
    </div>
</div>
{% endblock %}
