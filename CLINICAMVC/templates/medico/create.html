{% extends 'base.html' %}
{% block title %}Nuevo Médico | Clínica{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('medicos.index') }}" class="btn btn-outline-secondary me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h3 class="fw-bold mb-0">Registrar Médico</h3>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-body p-4">
        <form action="{{ url_for('medicos.create') }}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre completo</label>
                <input type="text" class="form-control" name="nombre" placeholder="Dr. Juan Pérez" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Especialidad</label>
                <input type="text" class="form-control" name="especialidad" placeholder="Ej: Cardiología" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Teléfono</label>
                <input type="text" class="form-control" name="telefono" placeholder="Ej: 70012345" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Correo electrónico</label>
                <input type="email" class="form-control" name="correo" placeholder="medico@clinica.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">
                <i class="bi bi-check-circle"></i> Registrar Médico
            </button>
        </form>
    </div>
</div>
{% endblock %}
