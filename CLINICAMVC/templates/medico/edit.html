{% extends 'base.html' %}
{% block title %}Editar Médico | Clínica{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('medicos.index') }}" class="btn btn-outline-secondary me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h3 class="fw-bold mb-0">Editar Médico</h3>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-body p-4">
        <form action="{{ url_for('medicos.edit', id=medico.id) }}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre completo</label>
                <input type="text" class="form-control" name="nombre" value="{{ medico.nombre }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Especialidad</label>
                <input type="text" class="form-control" name="especialidad" value="{{ medico.especialidad }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Teléfono</label>
                <input type="text" class="form-control" name="telefono" value="{{ medico.telefono }}" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Correo electrónico</label>
                <input type="email" class="form-control" name="correo" value="{{ medico.correo }}" required>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-semibold">
                <i class="bi bi-check-circle"></i> Actualizar Médico
            </button>
        </form>
    </div>
</div>
{% endblock %}
