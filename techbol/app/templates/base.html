<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBol - Gestion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f7ff; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #4a90d9; }
        .navbar-brand, .nav-link { color: #fff !important; font-weight: 500; }
        .nav-link:hover { color: #d6eaff !important; }
        .card { border: none; border-radius: 14px; box-shadow: 0 3px 12px rgba(74,144,217,0.12); }
        .card-header { background-color: #4a90d9; color: white; border-radius: 14px 14px 0 0 !important; }
        .btn-primary { background-color: #4a90d9; border-color: #4a90d9; }
        .btn-primary:hover { background-color: #3578c4; }
        .table thead th { background-color: #d6eaff; color: #2c5f9e; }
        .table-striped > tbody > tr:nth-of-type(odd) > td { background-color: #eaf4ff; }
        .footer { background-color: #4a90d9; color: #fff; padding: 12px 0; margin-top: 40px; text-align: center; font-size: 0.9rem; }
        .page-title { color: #2c5f9e; font-weight: 700; margin-bottom: 1.2rem; }
        .form-label { color: #2c5f9e; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('bp_core.index') }}">
                <i class="bi bi-box-seam me-2"></i>TechBol
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('bp_productos.index') }}">
                            <i class="bi bi-tags me-1"></i>Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('bp_clientes.index') }}">
                            <i class="bi bi-people me-1"></i>Clientes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('bp_pedidos.index') }}">
                            <i class="bi bi-cart3 me-1"></i>Pedidos
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container pb-4">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        <span>TechBol &copy; 2026 &mdash; Sistema de Gestion de Inventario y Ventas</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
