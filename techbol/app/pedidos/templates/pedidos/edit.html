{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header py-3">
                <h5 class="mb-0"><i class="bi bi-pencil me-2"></i>Editar Pedido</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('bp_pedidos.edit', id=pedido.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Cliente</label>
                        <select name="cliente_id" class="form-select" required>
                            {% for c in clientes %}
                            <option value="{{ c.id }}" {% if c.id == pedido.cliente_id %}selected{% endif %}>{{ c.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Producto</label>
                        <select name="producto_id" class="form-select" required>
                            {% for p in productos %}
                            <option value="{{ p.id }}" {% if p.id == pedido.producto_id %}selected{% endif %}>{{ p.nombre }} (Bs. {{ "%.2f"|format(p.precio) }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Monto (Bs.)</label>
                        <input type="number" step="0.01" name="monto" class="form-control" value="{{ pedido.monto }}" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Actualizar</button>
                        <a href="{{ url_for('bp_pedidos.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
