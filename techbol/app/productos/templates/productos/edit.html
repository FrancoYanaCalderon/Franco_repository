{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header py-3">
                <h5 class="mb-0"><i class="bi bi-pencil me-2"></i>Editar Producto</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('bp_productos.edit', id=producto.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Producto</label>
                        <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio (Bs.)</label>
                        <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Stock</label>
                        <input type="number" name="stock" class="form-control" value="{{ producto.stock }}" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Actualizar</button>
                        <a href="{{ url_for('bp_productos.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
