{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header py-3">
                <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Nuevo Producto</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('bp_productos.create') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Producto</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Laptop HP" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio (Bs.)</label>
                        <input type="number" step="0.01" name="precio" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Stock</label>
                        <input type="number" name="stock" class="form-control" placeholder="0" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
                        <a href="{{ url_for('bp_productos.index') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
