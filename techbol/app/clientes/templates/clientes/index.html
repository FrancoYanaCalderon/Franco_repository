{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="page-title mb-0"><i class="bi bi-people me-2"></i>Listado de Clientes</h2>
    <a href="{{ url_for('bp_clientes.create') }}" class="btn btn-primary">
        <i class="bi bi-plus-circle me-1"></i>Nuevo Cliente
    </a>
</div>
<div class="card">
    <div class="card-body p-0">
        <table class="table table-striped table-hover mb-0">
            <thead>
                <tr><th>#</th><th>Nombre</th><th>Telefono</th><th class="text-center">Acciones</th></tr>
            </thead>
            <tbody>
                {% for item in clientes %}
                <tr>
                    <td>{{ item.id }}</td>
                    <td>{{ item.nombre }}</td>
                    <td>{{ item.telefono }}</td>
                    <td class="text-center">
                        <a href="{{ url_for('bp_clientes.edit', id=item.id) }}" class="btn btn-warning btn-sm me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form action="{{ url_for('bp_clientes.delete', id=item.id) }}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Eliminar cliente?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" class="text-center text-muted py-3">No hay clientes registrados.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
<div class="mt-3">
    <a href="{{ url_for('bp_core.index') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Volver al Inicio
    </a>
</div>
{% endblock %}
